# AI OS Virtual Corporate HQ — Nginx Reverse Proxy
# Place at: /etc/nginx/sites-available/ai-os
# Symlink: ln -s /etc/nginx/sites-available/ai-os /etc/nginx/sites-enabled/ai-os
# Domain placeholder replaced automatically by install-vps.sh

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name yourdomain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name yourdomain.com;

    # TLS — managed by Certbot (auto-populated after certbot --nginx)
    ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security headers (supplement Helmet)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;
    gzip_comp_level 6;

    # --- Static files — served directly by Nginx, bypass Node ---
    location /css/ {
        alias /opt/ai-os/dashboard/css/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /js/ {
        alias /opt/ai-os/dashboard/js/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /assets/ {
        alias /opt/ai-os/dashboard/assets/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /docs/ {
        alias /opt/ai-os/dashboard/docs/;
        expires 1d;
        access_log off;
    }

    location /favicon.ico {
        alias /opt/ai-os/dashboard/favicon.ico;
        expires 30d;
        access_log off;
    }

    location /robots.txt {
        alias /opt/ai-os/dashboard/robots.txt;
        access_log off;
    }

    # --- WebSocket upgrade (dashboard live updates) ---
    location /ws {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # --- API proxy with rate limiting ---
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_buffering off;

        # Rate limit at Nginx layer (backup to Express rate-limit)
        limit_req zone=api burst=20 nodelay;
    }

    # --- Stripe webhook (needs raw body, longer timeout) ---
    location /api/stripe/webhook {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;

        # No rate limit on webhook
    }

    # --- Hermes MCP proxy (if exposed externally) ---
    location /hermes/ {
        proxy_pass http://127.0.0.1:8420/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;

        # Restrict to authenticated requests only
        limit_req zone=api burst=5 nodelay;
    }

    # --- HTML pages via Node ---
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Block sensitive paths ---
    location ~ /\.(env|git|magent|claude) {
        deny all;
        return 404;
    }

    # Block access to state files
    location ~ /(state|vault|artifacts)/ {
        deny all;
        return 404;
    }

    # Max upload size (for future file uploads)
    client_max_body_size 25M;
}

# Rate limit zone — add to http {} block of /etc/nginx/nginx.conf:
# limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
