# AI OS Orchestration Lab — Nginx reverse proxy
# Place at: /etc/nginx/sites-available/ai-os
# Symlink: ln -s /etc/nginx/sites-available/ai-os /etc/nginx/sites-enabled/ai-os

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name yourdomain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name yourdomain.com;

    # TLS — managed by Certbot
    ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

    # Security headers (supplement Helmet)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip (supplement Express compression)
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;
    gzip_comp_level 6;

    # Static files — served directly by Nginx, bypass Node
    location /css/ {
        alias /opt/ai-os/dashboard/css/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /js/ {
        alias /opt/ai-os/dashboard/js/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /assets/ {
        alias /opt/ai-os/dashboard/assets/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /favicon.ico {
        alias /opt/ai-os/dashboard/favicon.ico;
        expires 30d;
        access_log off;
    }

    location /robots.txt {
        alias /opt/ai-os/dashboard/robots.txt;
        access_log off;
    }

    # WebSocket upgrade
    location /ws {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # API proxy
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # Rate limit at Nginx layer (backup to Express rate-limit)
        limit_req zone=api burst=20 nodelay;
    }

    # Everything else — HTML pages via Node
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Block direct access to sensitive paths
    location ~ /\.(env|git|magent) {
        deny all;
        return 404;
    }

    # Max upload size
    client_max_body_size 10M;
}

# Rate limit zone (define in http {} block of nginx.conf)
# limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
